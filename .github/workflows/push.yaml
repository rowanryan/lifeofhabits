name: Checks

on:
    push:
        branches: ["**"]

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        concurrency:
            group: unit-tests-${{ github.head_ref || github.ref_name }}
            cancel-in-progress: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run unit tests
              run: bun run test:unit

    i18n-check:
        name: I18n Check
        runs-on: ubuntu-latest
        concurrency:
            group: i18n-check-${{ github.head_ref || github.ref_name }}
            cancel-in-progress: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run i18n check
              run: bun run i18n:check
